<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

.tarjeta {
    display: flex;
    flex-direction: column;
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    max-width: 300px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0);
}

.qr {
    text-align: center;
}

@media (min-width: 600px) {
    .tarjeta {
        max-width: 400px;
    }
}

</style>

</head>

<body>

<div class="tarjeta">

    <h2>Nombre del producto</h2>
    <p><strong>Categoría:</strong> </p>
    <p><strong>Estado:</strong> </p>
    <p><strong>Propietario:</strong> </p>
    <p>Descripción del producto</p>

    <div class="qr">
        <img src="" alt="QR">
    </div>

</div>

</body>
</html>
